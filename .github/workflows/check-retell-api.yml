name: Monthly Retell API check

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new Retell API endpoints
        id: check
        shell: bash
        run: |
          set +e

          echo "=== Scraping Retell API docs ==="
          RETELL_PAGE=$(curl -sL https://docs.retellai.com/api-references/list-agents)
          RETELL_ENDPOINTS=$(echo "$RETELL_PAGE" | grep -oP 'href="/api-references/[^"]+' | sed 's|href="/api-references/||' | sort -u)
          RETELL_COUNT=$(echo "$RETELL_ENDPOINTS" | grep -c . || echo "0")
          echo "Found $RETELL_COUNT endpoints on Retell docs"

          echo "=== Counting our MCP tools ==="
          OUR_COUNT=$(grep -roh 'registerTool(' src/tools/*.ts 2>/dev/null | wc -l || echo "0")
          echo "We have $OUR_COUNT tools"

          COVERED="create-phone-call create-web-call get-call list-calls update-call delete-call create-chat create-sms-chat get-chat create-chat-completion list-chat update-chat end-chat create-phone-number get-phone-number list-phone-numbers update-phone-number delete-phone-number create-agent get-agent list-agents update-agent delete-agent publish-agent get-agent-versions create-chat-agent get-chat-agent list-chat-agents update-chat-agent delete-chat-agent publish-chat-agent get-chat-agent-versions create-retell-llm get-retell-llm list-retell-llms update-retell-llm delete-retell-llm create-conversation-flow get-conversation-flow list-conversation-flows update-conversation-flow delete-conversation-flow create-conversation-flow-component get-conversation-flow-component list-conversation-flow-components update-conversation-flow-component delete-conversation-flow-component get-mcp-tools create-knowledge-base get-knowledge-base list-knowledge-bases delete-knowledge-base add-knowledge-base-sources delete-knowledge-base-source add-voice clone-voice search-voice get-voice list-voices create-batch-call create-batch-test get-concurrency import-phone-number register-phone-call llm-websocket create-test-case-definition get-test-case-definition list-test-case-definitions update-test-case-definition delete-test-case-definition get-batch-test list-batch-tests get-test-run list-test-runs"

          NEW=""
          NEW_COUNT=0
          while IFS= read -r ep; do
            [ -z "$ep" ] && continue
            FOUND=false
            for c in $COVERED; do
              if [ "$ep" = "$c" ]; then FOUND=true; break; fi
            done
            if [ "$FOUND" = "false" ]; then
              NEW="${NEW}- \`${ep}\` → https://docs.retellai.com/api-references/${ep}\n"
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done <<< "$RETELL_ENDPOINTS"

          echo "retell_count=$RETELL_COUNT" >> $GITHUB_OUTPUT
          echo "our_count=$OUR_COUNT" >> $GITHUB_OUTPUT
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT

          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            printf "%b" "$NEW" > /tmp/new_endpoints.txt
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Create issue for new endpoints
        if: steps.check.outputs.has_new == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const newEndpoints = fs.readFileSync('/tmp/new_endpoints.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 ${process.env.NEW_COUNT} nouveaux endpoints Retell AI detectes`,
              body: `## Scan mensuel — Nouveaux endpoints\n\nLe scan automatique a detecte **${process.env.NEW_COUNT} nouveaux endpoints** dans l'API Retell AI non couverts par le MCP server.\n\n**Endpoints Retell detectes:** ${process.env.RETELL_COUNT}\n**Outils MCP actuels:** ${process.env.OUR_COUNT}\n\n### Nouveaux endpoints a implementer\n\n${newEndpoints}\n\n### Action\n\nOuvre [claude.ai](https://claude.ai) et demande :\n> "Ajoute les nouveaux endpoints Retell: [liste ci-dessus]"\n\n---\n*Scan automatique mensuel — retellai-mcp-server*`,
              labels: ['api-update']
            });
        env:
          NEW_COUNT: ${{ steps.check.outputs.new_count }}
          RETELL_COUNT: ${{ steps.check.outputs.retell_count }}
          OUR_COUNT: ${{ steps.check.outputs.our_count }}

      - name: Log all-clear
        if: steps.check.outputs.has_new == 'false'
        run: |
          echo "✅ Couverture 100% confirmee"
          echo "Endpoints Retell: ${{ steps.check.outputs.retell_count }}"
          echo "Outils MCP: ${{ steps.check.outputs.our_count }}"
