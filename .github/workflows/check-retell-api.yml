name: Monthly Retell API check

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new Retell API endpoints
        id: check
        shell: bash
        run: |
          set +e

          echo "=== Scraping Retell API docs ==="
          RETELL_PAGE=$(curl -sL https://docs.retellai.com/api-references/list-agents)
          RETELL_ENDPOINTS=$(echo "$RETELL_PAGE" | grep -oP 'href="/api-references/[^"]+' | sed 's|href="/api-references/||' | sort -u)
          RETELL_COUNT=$(echo "$RETELL_ENDPOINTS" | grep -c . || echo "0")
          echo "Found $RETELL_COUNT endpoints on Retell docs"

          echo "=== Counting our MCP tools ==="
          OUR_COUNT=$(grep -roh 'registerTool(' src/tools/*.ts 2>/dev/null | wc -l || echo "0")
          echo "We have $OUR_COUNT tools"

          echo "=== Comparing ==="
          COVERED="create-phone-call create-web-call get-call list-calls update-call delete-call create-chat create-sms-chat get-chat create-chat-completion list-chat update-chat end-chat create-phone-number get-phone-number list-phone-numbers update-phone-number delete-phone-number create-agent get-agent list-agents update-agent delete-agent publish-agent get-agent-versions create-chat-agent get-chat-agent list-chat-agents update-chat-agent delete-chat-agent publish-chat-agent get-chat-agent-versions create-retell-llm get-retell-llm list-retell-llms update-retell-llm delete-retell-llm create-conversation-flow get-conversation-flow list-conversation-flows update-conversation-flow delete-conversation-flow create-conversation-flow-component get-conversation-flow-component list-conversation-flow-components update-conversation-flow-component delete-conversation-flow-component get-mcp-tools create-knowledge-base get-knowledge-base list-knowledge-bases delete-knowledge-base add-knowledge-base-sources delete-knowledge-base-source add-voice clone-voice search-voice get-voice list-voices create-batch-call create-batch-test get-concurrency import-phone-number register-phone-call llm-websocket"

          NEW=""
          while IFS= read -r ep; do
            [ -z "$ep" ] && continue
            FOUND=false
            for c in $COVERED; do
              if [ "$ep" = "$c" ]; then FOUND=true; break; fi
            done
            if [ "$FOUND" = "false" ]; then
              NEW="${NEW}- ${ep}\n"
              echo "NEW: $ep"
            fi
          done <<< "$RETELL_ENDPOINTS"

          echo "retell_count=$RETELL_COUNT" >> $GITHUB_OUTPUT
          echo "our_count=$OUR_COUNT" >> $GITHUB_OUTPUT

          if [ -n "$NEW" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            printf "%b" "$NEW" > /tmp/new_endpoints.txt
            echo "=== New endpoints found ==="
            cat /tmp/new_endpoints.txt
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "=== All endpoints covered ==="
          fi
          exit 0

      - name: Send alert email
        if: steps.check.outputs.has_new == 'true'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Retell AI API — Nouveaux endpoints detectes"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Bonjour Valdo,

            Le scan mensuel a detecte de nouveaux endpoints Retell AI
            non couverts par ton retellai-mcp-server.

            Endpoints Retell: ${{ steps.check.outputs.retell_count }}
            Outils MCP actuels: ${{ steps.check.outputs.our_count }}

            Nouveaux endpoints:
            $(cat /tmp/new_endpoints.txt)

            Action: Ouvre claude.ai et demande
            "Ajoute les nouveaux endpoints Retell: [liste ci-dessus]"

            -- retellai-mcp-server scan automatique

      - name: Send all-clear email
        if: steps.check.outputs.has_new == 'false'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Retell AI API — Couverture 100 pourcent confirmee"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Bonjour Valdo,

            Scan mensuel OK. Ton retellai-mcp-server couvre 100%
            des endpoints Retell AI.

            Endpoints Retell: ${{ steps.check.outputs.retell_count }}
            Outils MCP: ${{ steps.check.outputs.our_count }}

            Rien a faire.

            -- retellai-mcp-server scan automatique
